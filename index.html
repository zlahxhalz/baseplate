

<![CDATA[<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Shalz</title>
  <meta name="description" content="WELCOME" />
  <meta property="og:title" content="PS Portfolio | Shalz" />
  <meta property="og:description" content=" " />
  <meta property="og:image" content="https://cdn.simulationtheory.ai/gasset/?asset=img&prompt=minimal%20powershell%20portfolio%20terminal%20interface&w=1200&h=630&style=professional" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="https://cdn.simulationtheory.ai/gasset/?asset=img&prompt=minimal%20terminal%20favicon%20icon&w=64&h=64&style=professional" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/chat/cdn/animate.min.css" rel="stylesheet" />
  <script src="/chat/cdn/papaparse.min.js"></script>
</head>
<body class="h-full bg-black text-green-400 font-mono">
  <div id="appLoading" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-50">
    <div class="text-center">
      <div class="w-10 h-10 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mx-auto"></div>
      <p class="mt-3 text-sm text-slate-200">Starting terminal...</p>
    </div>
  </div>

  <div id="appRoot" class="hidden min-h-full flex items-center justify-center p-4">
    <div class="w-full max-w-5xl rounded-2xl overflow-hidden border border-slate-300 dark:border-slate-700 shadow-2xl bg-white dark:bg-slate-900">
      <div class="px-4 py-2 bg-slate-900 text-slate-100 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-2 text-xs sm:text-sm">
          <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
          <span>Terminal</span>
        </div>
        <button id="themeToggle" hidden class="px-3 py-1.5 rounded-lg border border-slate-600 hover:bg-slate-800 transition-all duration-300 text-xs sm:text-sm">Theme</button>
      </div>

      <div class="bg-[#012456] text-slate-100 font-mono h-[78vh] flex flex-col">
        <div id="output" class="flex-1 overflow-y-auto p-4 space-y-1 text-sm leading-6"></div>
        <form id="cmdForm" class="border-t border-sky-900/70 bg-[#012456] p-3 flex items-center gap-2">
          <span id="promptPath" class="text-cyan-200 shrink-0"></span>
          <input id="cmdInput" type="text" autocomplete="off" spellcheck="false" aria-label="PowerShell command input" class="flex-1 bg-transparent outline-none text-slate-100 placeholder:text-slate-300" placeholder="Type a command like dir, cd docs, or open poc_vulnerability_report.pdf" />
          <button type="submit" class="px-3 py-1.5 rounded-lg bg-cyan-400 text-slate-950 font-semibold hover:bg-cyan-300 transition-all duration-300 text-xs sm:text-sm">Run</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const SITE_CONFIG = {
        name: "spruce",
        role: "Cybersecurity Enthusiast",
        githubUrl: "https://github.com/zlahxhalz",
        reportUrl: "./assets/poc_vulnerability_report.pdf"
      };

      const createFileSystem = () => ({
        type: "dir",
        children: {
          "about.txt": {
            type: "file",
            kind: "text",
            content: `Name: ${SITE_CONFIG.name}
Role: ${SITE_CONFIG.role}
Contact: 1752left@gmail.com 
Tip: Use 'cd docs' then 'dir' to find key files.`
          },
          "readme.txt": {
            type: "file",
            kind: "text",
            content: `Portfolio Terminal Commands
help                 Show all commands
dir or ls            List files/folders
cd <folder>          Change location
cd ..                Move up one level
pwd                  Show current path
cat <file>           Read text file
open <file|alias>    Open link or PDF
where <term>         Search for item paths
tree                 Display folder tree
history              Show command history
export               Save command history to CSV
clear                Clear console`
          },
          "docs": {
            type: "dir",
            children: {
              "resume.pdf": {
                type: "file",
                kind: "asset",
                assetKey: "resume"
              },
              "poc_vulnerability_report.pdf": {
                type: "file",
                kind: "asset",
                assetKey: "report"
              }
            }
          },
          "links": {
            type: "dir",
            children: {
              "github.url": {
                type: "file",
                kind: "asset",
                assetKey: "github"
              },
              "contact.txt": {
                type: "file",
                kind: "text",
                content: "1752left@gmail.com"
              }
            }
          }
        }
      });

      const state = {
        cwd: [],
        history: [],
        historyMeta: [],
        historyIndex: 0,
        aiLastCallMs: 0,
        fs: createFileSystem()
      };

      const el = (id) => document.getElementById(id);

      const isValidUrl = (url) => typeof url === "string" && /^(https?:\/\/|\/|\.\/)/i.test(url);

      const setTheme = (theme) => {
        if (theme === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
        localStorage.setItem("portfolio_terminal_theme", theme);
        const btn = el("themeToggle");
        btn.textContent = theme === "dark" ? "Light mode" : "Dark mode";
      };

      const initTheme = () => {
        const saved = localStorage.getItem("portfolio_terminal_theme");
        if (saved === "dark" || saved === "light") {
          setTheme(saved);
          return;
        }
        setTheme("dark");
      };

      const outputNode = () => el("output");

      const appendOutput = (node) => {
        outputNode().appendChild(node);
        outputNode().scrollTop = outputNode().scrollHeight;
      };

      const printLine = (text, tone = "normal") => {
        const map = {
          normal: "text-slate-100",
          muted: "text-slate-300",
          info: "text-cyan-200",
          success: "text-green-300",
          warning: "text-amber-200",
          error: "text-rose-300"
        };
        const row = document.createElement("div");
        row.className = `whitespace-pre-wrap ${map[tone] || map.normal}`;
        row.textContent = text;
        appendOutput(row);
      };

      const promptString = () => `PS C:\\${state.cwd.join("\\")}${state.cwd.length ? "\\" : ""}>`;

      const pathForDisplay = (pathArr) => pathArr.length ? `C:\\${pathArr.join("\\")}` : "C:\\";

      const renderPrompt = () => {
        el("promptPath").textContent = promptString();
      };

      const printCommand = (raw) => {
        const row = document.createElement("div");
        row.className = "flex flex-wrap gap-2";
        const prompt = document.createElement("span");
        prompt.className = "text-cyan-200";
        prompt.textContent = promptString();
        const cmd = document.createElement("span");
        cmd.className = "text-slate-100";
        cmd.textContent = raw;
        row.appendChild(prompt);
        row.appendChild(cmd);
        appendOutput(row);
      };

      const tokenize = (raw) => {
        const tokens = [];
        raw.replace(/"([^"]*)"|[^\s]+/g, (match, quoted) => {
          tokens.push(typeof quoted === "string" ? quoted : match);
          return match;
        });
        return tokens;
      };

      const resolvePath = (inputPath) => {
        const raw = (inputPath || "").trim();
        if (!raw || raw === ".") return [...state.cwd];
        if (/^[a-zA-Z]:$/.test(raw)) return [];
        const normalized = raw.replace(/\//g, "\\");
        const isAbsolute = /^([a-zA-Z]:\\|\\)/.test(normalized);
        let rel = normalized;
        if (/^[a-zA-Z]:\\/.test(rel)) rel = rel.slice(3);
        if (rel.startsWith("\\")) rel = rel.slice(1);
        const parts = rel.split("\\").filter(Boolean);
        const out = isAbsolute ? [] : [...state.cwd];
        for (const partRaw of parts) {
          const part = partRaw.trim();
          if (!part || part === ".") continue;
          if (part === "..") {
            if (out.length) out.pop();
            continue;
          }
          out.push(part);
        }
        return out;
      };

      const getNodeByPath = (pathArr) => {
        let node = state.fs;
        for (const segment of pathArr) {
          if (!node || node.type !== "dir") return null;
          if (!Object.prototype.hasOwnProperty.call(node.children, segment)) return null;
          node = node.children[segment];
        }
        return node;
      };

      const getAssetUrl = (assetKey) => {
        if (assetKey === "resume") return SITE_CONFIG.resumeUrl;
        if (assetKey === "report") return SITE_CONFIG.reportUrl;
        if (assetKey === "github") return SITE_CONFIG.githubUrl;
        return "";
      };

      const safeOpen = (url) => {
        if (!isValidUrl(url)) {
          printLine("Target URL is invalid.", "error");
          return;
        }
        const win = window.open(url, "_blank", "noopener,noreferrer");
        if (win === null) {
          printLine("Open command sent. If no tab appeared, allow popups and run again.", "warning");
          return;
        }
        printLine(`Opened ${url}`, "success");
      };

      const sortedEntries = (dirNode) => Object.entries(dirNode.children).sort((a, b) => {
        const aIsDir = a[1].type === "dir";
        const bIsDir = b[1].type === "dir";
        if (aIsDir && !bIsDir) return -1;
        if (!aIsDir && bIsDir) return 1;
        return a[0].localeCompare(b[0]);
      });

      const showHelp = () => {
        printLine("Available commands", "info");
        printLine("help                 Show this command list", "muted");
        printLine("dir | ls [path]      List files and folders", "muted");
        printLine("cd [path]            Change folder (no arg returns to C:\\)", "muted");
        printLine("pwd                  Show current path", "muted");
        printLine("cat | type <file>    Read a text file or show target URL", "muted");
        printLine("open <file|alias>    Open resume/report/github in a new tab", "muted");
        printLine("where <term>         Search for matching names", "muted");
        printLine("tree [path]          Print folder tree", "muted");
        printLine("history              Show command history", "muted");
        printLine("export               Save command history to CSV", "muted");
        printLine("whoami               Show profile summary", "muted");
        printLine("clear | cls          Clear terminal output", "muted");
      };

      const cmdDir = (args) => {
        const targetPath = args.length ? resolvePath(args.join(" ")) : [...state.cwd];
        const node = getNodeByPath(targetPath);
        if (!node) {
          printLine("Path not found.", "error");
          return;
        }
        if (node.type === "file") {
          printLine(`     ${targetPath[targetPath.length - 1]}`, "normal");
          return;
        }
        const entries = sortedEntries(node);
        printLine(`Directory: ${pathForDisplay(targetPath)}`, "info");
        if (!entries.length) {
          printLine("<empty>", "muted");
          return;
        }
        entries.forEach(([name, entryNode]) => {
          const label = entryNode.type === "dir" ? "<DIR>" : "     ";
          printLine(`${label}  ${name}`, entryNode.type === "dir" ? "info" : "normal");
        });
      };

      const cmdCd = (args) => {
        if (!args.length) {
          state.cwd = [];
          renderPrompt();
          printLine(`Current location: ${pathForDisplay(state.cwd)}`, "success");
          return;
        }
        const targetPath = resolvePath(args.join(" "));
        const node = getNodeByPath(targetPath);
        if (!node) {
          printLine("Path not found.", "error");
          return;
        }
        if (node.type !== "dir") {
          printLine("cd target must be a directory.", "error");
          return;
        }
        state.cwd = targetPath;
        renderPrompt();
        printLine(`Current location: ${pathForDisplay(state.cwd)}`, "success");
      };

      const cmdCat = (args) => {
        if (!args.length) {
          printLine("Usage: cat <file>", "warning");
          return;
        }
        const targetPath = resolvePath(args.join(" "));
        const node = getNodeByPath(targetPath);
        if (!node) {
          printLine("File not found.", "error");
          return;
        }
        if (node.type !== "file") {
          printLine("cat target must be a file.", "error");
          return;
        }
        if (node.kind === "text") {
          printLine(node.content, "muted");
          return;
        }
        if (node.kind === "asset") {
          const url = getAssetUrl(node.assetKey);
          printLine(url || "No URL configured for this file.", url ? "info" : "error");
          return;
        }
        printLine("Unsupported file type.", "error");
      };

      const cmdOpen = (args) => {
        if (!args.length) {
          printLine("Usage: open <report|poc|poc_vulnerability_report.pdf>", "warning");
          return;
        }
        const raw = args.join(" ").trim();
        const key = raw.toLowerCase();

        if ([
          "report",
          "poc",
          "poc_vulnerability_report.pdf",
          "poc-vulnerability-report.pdf",
          "docs/poc_vulnerability_report.pdf",
          "docs\\poc_vulnerability_report.pdf"
        ].includes(key)) {
          safeOpen(SITE_CONFIG.reportUrl);
          return;
        }
        /*  later, gator
        if (key === "resume") {
          safeOpen(SITE_CONFIG.resumeUrl);
          return;
        }
        if (key === "github") {
          safeOpen(SITE_CONFIG.githubUrl);
          return;
        }
      */
        const targetPath = resolvePath(raw);
        const node = getNodeByPath(targetPath);
        if (!node) {
          printLine("Target not found.", "error");
          return;
        }
        if (node.type !== "file") {
          printLine("open target must be a file.", "error");
          return;
        }
        if (node.kind === "asset") {
          const url = getAssetUrl(node.assetKey);
          safeOpen(url);
          return;
        }
        printLine("This file is text-based. Use cat instead.", "warning");
      };

      const recursiveSearch = (node, pathArr, needle, results) => {
        if (!node || node.type !== "dir") return;
        const entries = sortedEntries(node);
        entries.forEach(([name, child]) => {
          const childPath = [...pathArr, name];
          if (name.toLowerCase().includes(needle)) results.push(childPath);
          if (child.type === "dir") recursiveSearch(child, childPath, needle, results);
        });
      };

      const cmdWhere = (args) => {
        if (!args.length) {
          printLine("Usage: where <term>", "warning");
          return;
        }
        const needle = args.join(" ").toLowerCase();
        if (needle.includes("report") || needle.includes("poc")) {
          printLine("C:\\docs\\poc_vulnerability_report.pdf", "success");
          return;
        }
        const matches = [];
        recursiveSearch(state.fs, [], needle, matches);
        if (!matches.length) {
          printLine("No matching paths found.", "error");
          return;
        }
        matches.forEach((pathArr) => {
          printLine(pathForDisplay(pathArr), "info");
        });
      };

      const buildTreeLines = (node, prefix, lines) => {
        if (!node || node.type !== "dir") return;
        const entries = sortedEntries(node);
        entries.forEach(([name, child], idx) => {
          const isLast = idx === entries.length - 1;
          const branch = isLast ? "└──" : "├──";
          const suffix = child.type === "dir" ? "\\" : "";
          lines.push(`${prefix}${branch} ${name}${suffix}`);
          if (child.type === "dir") {
            buildTreeLines(child, `${prefix}${isLast ? "    " : "│   "}`, lines);
          }
        });
      };

      const cmdTree = (args) => {
        const targetPath = args.length ? resolvePath(args.join(" ")) : [...state.cwd];
        const node = getNodeByPath(targetPath);
        if (!node) {
          printLine("Path not found.", "error");
          return;
        }
        if (node.type !== "dir") {
          printLine(pathForDisplay(targetPath), "muted");
          return;
        }
        const lines = [pathForDisplay(targetPath)];
        buildTreeLines(node, "", lines);
        printLine(lines.join("\n"), "muted");
      };

      const cmdHistory = () => {
        if (!state.history.length) {
          printLine("No command history yet.", "muted");
          return;
        }
        state.history.forEach((item, idx) => {
          printLine(`${idx + 1}. ${item}`, "muted");
        });
      };

      const cmdExport = async () => {
        if (typeof window.save_data_to_csv !== "function") {
          printLine("CSV save function is unavailable in this environment.", "error");
          return;
        }
        const rows = state.history.map((command, idx) => ({
          index: idx + 1,
          timestamp: state.historyMeta[idx]?.timestamp || "",
          command,
          path: state.historyMeta[idx]?.path || ""
        }));
        if (!rows.length) {
          rows.push({
            index: 1,
            timestamp: new Date().toISOString(),
            command: "",
            path: pathForDisplay(state.cwd)
          });
        }
        try {
          await Promise.resolve(window.save_data_to_csv("portfolio_terminal_history.csv", rows));
          printLine("Command history exported to CSV.", "success");
        } catch (error) {
          printLine(`CSV export failed: ${error.message || "Unknown error"}`, "error");
        }
      };

      const executeCommand = async (raw) => {
        const tokens = tokenize(raw);
        if (!tokens.length) return;
        const command = tokens[0].toLowerCase();
        const args = tokens.slice(1);

        if (command === "clear" || command === "cls") {
          outputNode().innerHTML = "";
          return;
        }

        if (command === "help" || command === "?") {
          showHelp();
          return;
        }

        if (command === "dir" || command === "ls") {
          cmdDir(args);
          return;
        }

        if (command === "cd") {
          cmdCd(args);
          return;
        }

        if (command === "pwd") {
          printLine(pathForDisplay(state.cwd), "info");
          return;
        }

        if (command === "cat" || command === "type") {
          cmdCat(args);
          return;
        }

        if (command === "open" || command === "start") {
          cmdOpen(args);
          return;
        }

        if (command === "where") {
          cmdWhere(args);
          return;
        }

        if (command === "tree") {
          cmdTree(args);
          return;
        }

        if (command === "history") {
          cmdHistory();
          return;
        }

        if (command === "export") {
          await cmdExport();
          return;
        }

        if (command === "nextstep") {
          await cmdNextStep(args);
          return;
        }

        if (command === "whoami") {
          printLine(`${SITE_CONFIG.name} | ${SITE_CONFIG.role}`, "info");
          return;
        }

        printLine(`Unknown command: ${command}. Type 'help' to see available commands.`, "error");
      };

      const onSubmit = async (evt) => {
        evt.preventDefault();
        const input = el("cmdInput");
        const raw = input.value.trim();
        if (!raw) {
          input.focus();
          return;
        }
        printCommand(raw);
        state.history.push(raw);
        state.historyMeta.push({
          timestamp: new Date().toISOString(),
          path: pathForDisplay(state.cwd)
        });
        state.historyIndex = state.history.length;
        input.value = "";
        try {
          await executeCommand(raw);
        } catch (error) {
          printLine(`Command failed: ${error.message || "Unknown error"}`, "error");
        }
        renderPrompt();
        input.focus();
      };

      const onHistoryKey = (evt) => {
        const input = el("cmdInput");
        if (evt.key === "ArrowUp") {
          evt.preventDefault();
          if (!state.history.length) return;
          state.historyIndex = Math.max(0, state.historyIndex - 1);
          input.value = state.history[state.historyIndex] || "";
          return;
        }
        if (evt.key === "ArrowDown") {
          evt.preventDefault();
          if (!state.history.length) return;
          state.historyIndex = Math.min(state.history.length, state.historyIndex + 1);
          input.value = state.historyIndex === state.history.length ? "" : (state.history[state.historyIndex] || "");
        }
      };

      const initEvents = () => {
        el("cmdForm").addEventListener("submit", onSubmit);
        el("cmdInput").addEventListener("keydown", onHistoryKey);
        el("themeToggle").addEventListener("click", () => {
          const dark = document.documentElement.classList.contains("dark");
          setTheme(dark ? "light" : "dark");
        });
      };

      const printBanner = () => {
        printLine("PowerShell", "success");
        printLine(`Welcome to ${SITE_CONFIG.name}'s terminal`, "info");
        printLine("Type 'help' to list commands.", "muted");
        printLine(" ", "muted");
      };

      const init = () => {
        initTheme();
        initEvents();
        renderPrompt();
        printBanner();
        el("appLoading").classList.add("hidden");
        el("appRoot").classList.remove("hidden");
        el("cmdInput").focus();
      };

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
</body>
